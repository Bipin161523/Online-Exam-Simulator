<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: linear-gradient(120deg, #84fab0, #8fd3f4);
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: white;
}

/* Card */
.card {
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s;
}

/* Options */
.option {
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    background: #e3f2fd;
}

.selected {
    background: #90caf9;
}

/* Button */
button {
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="header">
    <div id="welcome"></div>
    <div id="timer"></div>
</div>

<div class="card">
    <div id="questionBox"></div>
    <button onclick="nextQuestion()">Next ➡️</button>
</div>

<script src="script.js"></script>

</body>
</html>
