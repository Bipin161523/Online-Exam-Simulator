<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f4f4f4;
    --card: #fff;
    --text: #000;
    --primary: #2980b9;
}

body.dark {
    --bg: #121212;
    --card: #1e1e1e;
    --text: #fff;
}

body {
    margin: 0;
    font-family: Arial;
    background: url('https://images.unsplash.com/photo-1588072432836-e10032774350') no-repeat center center/cover;
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    position: relative;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: 0;
}

/* Keep UI above overlay */
.container, .toggle-dark {
    position: relative;
    z-index: 1;
}

/* Container */
.container {
    width: 360px;
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* Slider */
.forms {
    display: flex;
    width: 200%;
    transition: 0.5s;
}

.form {
    width: 50%;
    padding: 25px;
}

/* Toggle buttons */
.switch {
    display: flex;
}

.switch button {
    flex: 1;
    padding: 15px;
    border: none;
    cursor: pointer;
    background: #ddd;
}

.switch button.active {
    background: var(--primary);
    color: white;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* Buttons */
.submit {
    width: 100%;
    padding: 10px;
    background: var(--primary);
    color: white;
    border: none;
}

/* Dark toggle */
.toggle-dark {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
}

/* Responsive */
@media(max-width: 400px) {
    .container {
        width: 90%;
    }
}
</style>

</head>
<body>

<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<div class="container">

    <!-- Switch -->
    <div class="switch">
        <button id="loginBtn" class="active" onclick="slide('login')">Login</button>
        <button id="registerBtn" onclick="slide('register')">Register</button>
    </div>

    <!-- Forms -->
    <div class="forms" id="forms">

        <!-- Login -->
        <div class="form">
            <h2>Login</h2>
            <input type="text" id="loginUser" placeholder="Username">
            
            <div style="position:relative;">
                <input type="password" id="loginPass" placeholder="Password">
                <span onclick="togglePass('loginPass')" 
                style="position:absolute; right:10px; top:12px; cursor:pointer;">👁️</span>
            </div>

            <button class="submit" onclick="login()">Login</button>
        </div>

        <!-- Register -->
        <div class="form">
            <h2>Register</h2>
            <input type="text" id="regUser" placeholder="Username">
            
            <div style="position:relative;">
                <input type="password" id="regPass" placeholder="Password">
                <span onclick="togglePass('regPass')" 
                style="position:absolute; right:10px; top:12px; cursor:pointer;">👁️</span>
            </div>

            <button class="submit" onclick="register()">Register</button>
        </div>

    </div>
</div>

<script>
// Slide animation
function slide(type) {
    const forms = document.getElementById("forms");

    if(type === "register") {
        forms.style.transform = "translateX(-50%)";
        document.getElementById("registerBtn").classList.add("active");
        document.getElementById("loginBtn").classList.remove("active");
    } else {
        forms.style.transform = "translateX(0%)";
        document.getElementById("loginBtn").classList.add("active");
        document.getElementById("registerBtn").classList.remove("active");
    }
}

// Show/Hide Password
function togglePass(id) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// Dark Mode
function toggleDark() {
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode", document.body.classList.contains("dark"));
}

// Load saved theme
if(localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
}

// Register
function register() {
    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if(user === "" || pass === "") {
        alert("Fill all fields");
        return;
    }

    localStorage.setItem(user, pass);
    alert("Registered successfully!");
    slide("login");
}

// Login
function login() {
    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let storedPass = localStorage.getItem(user);

    if(storedPass === pass) {
        localStorage.setItem("username", user);
        window.location.href = "setup.html";
    } else {
        alert("Invalid credentials");
    }
}
</script>

</body>
</html>
